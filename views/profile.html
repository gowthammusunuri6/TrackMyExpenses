<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - TrackMyExpenses</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <img src="/images/logo.png" alt="Logo" class="brand-logo">
                <h3 class="brand-title">TrackMyExpenses</h3>
            </div>
            <nav class="sidebar-nav">
                <a href="/dashboard.html" class="nav-link"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
                <a href="/tracking.html" class="nav-link"><i class="fas fa-wallet"></i><span>Tracking</span></a>
                <a href="/savings.html" class="nav-link"><i class="fas fa-piggy-bank"></i><span>Savings</span></a>
                <a href="/reports.html" class="nav-link"><i class="fas fa-chart-bar"></i><span>Reports &
                        Analytics</span></a>
                <a href="/profile.html" class="nav-link active"><i class="fas fa-user"></i><span>Profile</span></a>
                <div class="nav-divider"></div>
                <a href="#" class="nav-link" id="logoutBtn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
            </nav>
        </aside>

        <main class="main-content">
            <div class="dashboard-content">
                <div class="grid grid-2">
                    <div class="card">
                        <h3 class="card-title"><i class="fas fa-user-edit"></i> Profile Information</h3>
                        <form id="profileForm">
                            <div class="form-group">
                                <label class="form-label">Full Name</label>
                                <input type="text" id="fullName" class="form-input" placeholder="Your name">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Email</label>
                                <input type="email" id="email" class="form-input" disabled>
                            </div>
                            <div class="form-group">
                                <label class="form-label">Monthly Budget (₹)</label>
                                <input type="number" id="budget" class="form-input" placeholder="50000" step="100">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="fas fa-save"></i> Update Profile
                            </button>
                        </form>
                    </div>

                    <div class="card" id="brandingCard" style="display: none;">
                        <h3 class="card-title"><i class="fas fa-palette"></i> Customize Branding</h3>
                        <form id="brandingForm" enctype="multipart/form-data">
                            <div class="form-group">
                                <label class="form-label">App Title</label>
                                <input type="text" id="appTitle" class="form-input" placeholder="TrackMyExpenses">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Upload Logo</label>
                                <input type="file" id="logoFile" class="form-input" accept="image/*">
                                <div style="margin-top: 1rem;">
                                    <img id="logoPreview" src="/images/logo.png" alt="Logo"
                                        style="max-width: 100px; max-height: 100px; border-radius: var(--radius-md);">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-secondary">
                                <i class="fas fa-upload"></i> Update Branding
                            </button>
                        </form>
                    </div>
                </div>

                <div class="card mt-4">
                    <h3 class="card-title"><i class="fas fa-info-circle"></i> Account Information</h3>
                    <div class="grid grid-3">
                        <div>
                            <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Role</p>
                            <p style="font-weight: 600;" id="userRole">-</p>
                        </div>
                        <div>
                            <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">Member Since</p>
                            <p style="font-weight: 600;" id="memberSince">-</p>
                        </div>
                        <div>
                            <p style="color: var(--text-secondary); margin-bottom: 0.5rem;">User ID</p>
                            <p style="font-weight: 600;" id="userId">-</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        let currentUser = requireAuth();
        if (!currentUser) location.href = '/';

        loadBranding();
        loadProfile();

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        async function loadProfile() {
            try {
                const response = await fetch(`/api/profile/${currentUser.id}`);
                const data = await response.json();

                document.getElementById('fullName').value = data.fullName;
                document.getElementById('email').value = data.email;
                document.getElementById('budget').value = data.budget;
                document.getElementById('appTitle').value = data.customTitle || 'TrackMyExpenses';
                document.getElementById('userRole').textContent = data.role.charAt(0).toUpperCase() + data.role.slice(1);
                document.getElementById('userId').textContent = data.id;

                const date = new Date(data.createdAt);
                document.getElementById('memberSince').textContent = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

                if (data.customLogo) {
                    document.getElementById('logoPreview').src = data.customLogo;
                }

                // Show branding section only for admins
                if (currentUser.role === 'admin') {
                    document.getElementById('brandingCard').style.display = 'block';
                }
            } catch (error) {
                console.error('Error loading profile:', error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const fullName = document.getElementById('fullName').value;
            const budget = document.getElementById('budget').value;

            try {
                const response = await fetch(`/api/profile/${currentUser.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, budget })
                });

                const data = await response.json();

                if (response.ok) {
                    alert('Profile updated successfully!');
                    currentUser.fullName = data.user.fullName;
                    sessionStorage.setItem('user', JSON.stringify(currentUser));
                } else {
                    alert(data.message || 'Error updating profile');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating profile');
            }
        });

        document.getElementById('brandingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('userId', currentUser.id);
            formData.append('title', document.getElementById('appTitle').value);

            const logoFile = document.getElementById('logoFile').files[0];
            if (logoFile) {
                formData.append('logo', logoFile);
            }

            try {
                const response = await fetch('/api/branding', {
                    method: 'POST',
                    body: formData
                });

                if (response.ok) {
                    alert('Branding updated! Refresh the page to see changes.');
                } else {
                    const data = await response.json();
                    alert(data.message || 'Error updating branding');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error updating branding');
            }
        });

        document.getElementById('logoFile').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('logoPreview').src = e.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
    </script>

    <!-- Chatbot Widget -->
    <div class="chatbot-container" id="chatbotContainer">
        <div class="chatbot-header" id="chatbotHeader">
            <div class="chatbot-title">
                <i class="fas fa-robot"></i>
                <span>Financial Assistant</span>
            </div>
            <button class="chatbot-close" id="chatbotClose">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="chatbot-body" id="chatbotBody">
            <div class="chat-message bot-message">
                <div class="message-avatar">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content">
                    Hello! 👋 I'm your financial assistant. How can I help you today?
                </div>
            </div>
        </div>
        <div class="chatbot-suggestions" id="chatbotSuggestions"></div>
        <div class="chatbot-footer">
            <input type="text" id="chatbotInput" placeholder="Ask me anything about your finances..."
                class="chatbot-input">
            <button class="chatbot-send" id="chatbotSend">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <!-- Chatbot Toggle Button -->
    <button class="chatbot-toggle" id="chatbotToggle">
        <i class="fas fa-comments"></i>
    </button>

    <script src="/js/chatbot.js"></script>
